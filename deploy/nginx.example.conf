# =============================================================================
# Beispiel: NGINX fuer dieses Projekt (Document Root = laravel/public)
#
# Absicherung in drei Teilen:
#   1) deploy/nginx-http-context.conf   -> in http { } einbinden (Rate-Limits)
#   2) deploy/nginx-server-hardening.conf -> Spezifische locations (VOR .php-Block)
#   3) deploy/nginx-security-headers.conf -> Header im server { }
#
# Plesk:
#   1) Document Root auf .../laravel/public setzen.
#   2) PHP-FPM-Version zuordnen (PHP 8.4 oder 8.5).
#   3) "Zusaetzliche nginx-Direktiven" im server-Block:
#      Inhalt aus (2) + (3) einfuegen.
#      http-Kontext (1) nur wenn der Hoster eine http-weite include erlaubt.
# =============================================================================

upstream php_fpm_yt_hub {
    # PHP 8.4 (Plesk-Standard ab 2025)
    server unix:/var/run/php/php8.4-fpm.sock;
    # PHP 8.5 — bei Upgrade umstellen:
    # server unix:/var/run/php/php8.5-fpm.sock;
    # Alternativ TCP:
    # server 127.0.0.1:9000;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # HTTPS-Redirect (Plesk uebernimmt das normalerweise automatisch)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    # Plesk verwaltet SSL-Zertifikate; Pfade hier nur als Referenz:
    # ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    root /var/www/vhosts/example.com/httpdocs/laravel/public;
    index index.php;

    charset utf-8;
    client_max_body_size 32M;

    # --- HSTS (erst aktivieren wenn HTTPS stabil laeuft) ----------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # --- Security-Header (siehe deploy/nginx-security-headers.conf) -----------
    include /var/www/vhosts/example.com/httpdocs/deploy/nginx-security-headers.conf;

    # --- Haertung: vor dem allgemeinen PHP-Block einfuegen --------------------
    include /var/www/vhosts/example.com/httpdocs/deploy/nginx-server-hardening.conf;

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Erfordert zone=yt_hub_php in deploy/nginx-http-context.conf (http { })
        # limit_req zone=yt_hub_php burst=40 nodelay;
        # limit_req_status 429;

        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php_fpm_yt_hub;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt { access_log off; log_not_found off; try_files $uri =404; }
}
