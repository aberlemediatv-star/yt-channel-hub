# =============================================================================
# NGINX: server { }-Block — Absicherung (mit deploy/nginx-http-context.conf)
#
# Reihenfolge: Spezifische location-Zweige VOR dem allgemeinen „location ~ \.php$“
# einfügen (erste passende Regex gewinnt).
#
# Plesk: Inhalt unter „Zusätzliche nginx-Direktiven“ der Domain — ggf. Pfade zu
# fastcgi_pass an die lokale PHP-FPM-Socket/TCP-Adresse anpassen.
# =============================================================================

# --- Schutz bei falsch gesetztem Document Root (Projekt statt public/) ----------
location ~* ^/(vendor|config|src|database|tests|bin|deploy)(/|$) {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* ^/(\.env|\.git|composer\.(json|lock)|package(-lock)?\.json)$ {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* \.(?:sql|bak|dist|md|neon|lock)$ {
    deny all;
    access_log off;
    log_not_found off;
}

