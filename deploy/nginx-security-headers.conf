# =============================================================================
# Zusätzliche nginx-Direktiven (Security-Header)
#
# In den server { }-Block einfügen oder Plesk: „Zusätzliche nginx-Direktiven“
#
# Hinweis: Die PHP-Anwendung setzt ähnliche Header (PublicHttp). Doppelte Header
# sind meist unkritisch; alternativ nur eine Ebene (nginx ODER App) nutzen.
# =============================================================================

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "interest-cohort=()" always;

# Nur bei HTTPS (listen 443 ssl) aktivieren — HSTS erzwingt HTTPS für Browser:
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Optional: explizit keine MIME-Sniffing-Umgehung für ältere Clients
# add_header X-Permitted-Cross-Domain-Policies "none" always;
