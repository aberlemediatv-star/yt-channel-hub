# =============================================================================
# NGINX: http { }-Kontext (Hauptkonfiguration / Plesk: ggf. „Zusätzliche Direktiven“
# auf Server-Ebene nur möglich, wenn der Hoster http-Blöcke erlaubt — sonst siehe
# deploy/nginx-server-hardening.conf ohne limit_req-Zonen.)
#
# Einbinden z. B. in /etc/nginx/nginx.conf innerhalb von http { }:
#   include /var/www/.../deploy/nginx-http-context.conf;
# =============================================================================

# Versionsnummer im Header ausblenden
server_tokens off;

# Rate-Limiting (pro IPv4/IPv6-Adresse)
limit_req_zone $binary_remote_addr zone=yt_hub_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=yt_hub_php:10m rate=15r/s;

# Optional: gleichzeitige Verbindungen pro IP begrenzen (schützt vor einfachen Floods)
limit_conn_zone $binary_remote_addr zone=yt_hub_conn:10m;
